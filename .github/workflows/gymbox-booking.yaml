name: Test Gymbox Workflow

on:
  workflow_dispatch:

jobs:
  test-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Print files
        run: |
          echo "Repository contents:"
          ls -R

      - name: Show Python version
        run: python --version

      - name: Done
        run: echo "Workflow working!"